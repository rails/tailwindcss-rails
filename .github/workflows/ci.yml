name: CI
concurrency:
  group: "${{github.workflow}}-${{github.ref}}"
  cancel-in-progress: true
on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - v*.*.*
  pull_request:
    types: [opened, synchronize]
    branches:
      - '*'

permissions: {}

jobs:
  lint-actions:
    name: GitHub Actions audit
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run actionlint
        uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          advanced-security: false

  tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.1", "3.2", "3.3", "3.4", "4.0", "head"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - run: rm Gemfile.lock
      - uses: ruby/setup-ruby@8e41b362d2589a22a44c1cfa214b3c83052c195b # zizmor: ignore[cache-poisoning] -- cached deps are for testing, not release artifact generation # v1.318.0
        with:
          ruby-version: ${{matrix.ruby}}
          bundler: latest
          bundler-cache: true
      - name: Run tests
        run: bin/test

  user-install:
    strategy:
      fail-fast: false
      matrix:
        plat: [ "ubuntu", "macos" ]
    runs-on: ${{matrix.plat}}-latest
    permissions:
      contents: read
    env:
      GEM_HOME: ${{ github.workspace }}/.gem # Needs to be a writable directory to bundle remove/add
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@8e41b362d2589a22a44c1cfa214b3c83052c195b # v1.318.0
        with:
          ruby-version: "4.0"
          bundler: latest
      - run: test/integration/user_install_test.sh
        shell: bash

  user-upgrade:
    strategy:
      fail-fast: false
      matrix:
        plat: [ "ubuntu", "macos" ]
    runs-on: ${{matrix.plat}}-latest
    permissions:
      contents: read
    env:
      GEM_HOME: ${{ github.workspace }}/.gem # Needs to be a writable directory to bundle remove/add
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@8e41b362d2589a22a44c1cfa214b3c83052c195b # v1.318.0
        with:
          ruby-version: "4.0"
          bundler: latest
      - run: test/integration/user_upgrade_test.sh
        shell: bash
