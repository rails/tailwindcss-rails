name: CI
concurrency:
  group: "${{github.workflow}}-${{github.ref}}"
  cancel-in-progress: true
on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - v*.*.*
  pull_request:
    types: [opened, synchronize]
    branches:
      - '*'

permissions: {}

jobs:
  lint-actions:
    name: GitHub Actions audit
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run actionlint
        uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e # v0.5.3
        with:
          advanced-security: false

  tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.1", "3.2", "3.3", "3.4", "4.0", "head"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - run: rm Gemfile.lock
      - uses: ruby/setup-ruby@c4e5b1316158f92e3d49443a9d58b31d25ac0f8f # zizmor: ignore[cache-poisoning] -- cached deps are for testing, not release artifact generation # v1.306.0
        with:
          ruby-version: ${{matrix.ruby}}
          bundler: latest
          bundler-cache: true
      - name: Run tests
        run: bin/test

  user-install:
    strategy:
      fail-fast: false
      matrix:
        plat: [ "ubuntu", "macos" ]
    runs-on: ${{matrix.plat}}-latest
    permissions:
      contents: read
    env:
      GEM_HOME: ${{ github.workspace }}/.gem # Needs to be a writable directory to bundle remove/add
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@c4e5b1316158f92e3d49443a9d58b31d25ac0f8f # v1.306.0
        with:
          ruby-version: "4.0"
          bundler: latest
      - run: test/integration/user_install_test.sh
        shell: bash

  user-upgrade:
    strategy:
      fail-fast: false
      matrix:
        plat: [ "ubuntu", "macos" ]
    runs-on: ${{matrix.plat}}-latest
    permissions:
      contents: read
    env:
      GEM_HOME: ${{ github.workspace }}/.gem # Needs to be a writable directory to bundle remove/add
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@c4e5b1316158f92e3d49443a9d58b31d25ac0f8f # v1.306.0
        with:
          ruby-version: "4.0"
          bundler: latest
      - run: test/integration/user_upgrade_test.sh
        shell: bash
