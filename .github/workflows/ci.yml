name: CI
concurrency:
  group: "${{github.workflow}}-${{github.ref}}"
  cancel-in-progress: true
on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - v*.*.*
  pull_request:
    types: [opened, synchronize]
    branches:
      - '*'

permissions: {}

jobs:
  lint-actions:
    name: GitHub Actions audit
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run actionlint
        uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          advanced-security: false

  tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.1", "3.2", "3.3", "3.4", "4.0", "head"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - run: rm Gemfile.lock
      - uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # zizmor: ignore[cache-poisoning] -- cached deps are for testing, not release artifact generation # v1.310.0
        with:
          ruby-version: ${{matrix.ruby}}
          bundler: latest
          bundler-cache: true
      - name: Run tests
        run: bin/test

  user-install:
    strategy:
      fail-fast: false
      matrix:
        plat: [ "ubuntu", "macos" ]
    runs-on: ${{matrix.plat}}-latest
    permissions:
      contents: read
    env:
      GEM_HOME: ${{ github.workspace }}/.gem # Needs to be a writable directory to bundle remove/add
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          ruby-version: "4.0"
          bundler: latest
      - run: test/integration/user_install_test.sh
        shell: bash

  user-upgrade:
    strategy:
      fail-fast: false
      matrix:
        plat: [ "ubuntu", "macos" ]
    runs-on: ${{matrix.plat}}-latest
    permissions:
      contents: read
    env:
      GEM_HOME: ${{ github.workspace }}/.gem # Needs to be a writable directory to bundle remove/add
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          ruby-version: "4.0"
          bundler: latest
      - run: test/integration/user_upgrade_test.sh
        shell: bash
